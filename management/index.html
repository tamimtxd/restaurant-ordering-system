<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rannaghor | Management</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo.png">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --nav-height: 80px;
            --glass-blur: blur(15px);
            --primary-orange: #FF8C00;
        }

        body {
            background: #0a0a0a;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(255, 140, 0, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(220, 20, 60, 0.05) 0%, transparent 50%);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--nav-height); /* Space for fixed nav */
        }

        /* Navigation Style (Matches Kitchen) */
        .admin-nav {
            height: var(--nav-height);
            background: rgba(10, 10, 10, 0.82);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--color-border);
            z-index: 1000;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
        }

        .admin-nav-container {
            max-width: 1200px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .brand-name {
            font-family: var(--font-display);
            font-size: 1.7rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #ffffff, #ffccaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-tagline {
            font-size: 0.85rem;
            color: var(--primary-orange);
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .brand-sub-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg);
            width: 100%;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .qr-management-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            border-radius: 20px;
            padding: var(--space-xl);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .qr-management-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--space-lg);
        }

        .qr-management-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            transition: all var(--transition-base);
        }

        .qr-management-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .qr-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qr-table-number {
            font-weight: var(--font-bold);
            font-size: var(--text-lg);
        }

        .btn-icon-qr {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon-qr:hover {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .qr-card-body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-md);
            background: white;
            border-radius: var(--radius-lg);
            aspect-ratio: 1 / 1;
            width: fit-content;
            margin: 0 auto;
        }

        .qr-preview {
            width: 140px;
            height: 140px;
        }

        .qr-card-footer {
            margin-top: auto;
        }

        .btn-full {
            width: 100%;
        }



        /* Controls */
        .admin-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            width: fit-content;
        }

        .admin-controls label {
            font-size: var(--text-sm);
            font-weight: var(--font-bold);
            color: var(--color-text-secondary);
        }

        .admin-controls input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-xs) var(--space-sm);
            width: 70px;
            text-align: center;
            color: white;
            font-weight: var(--font-bold);
            transition: all 0.2s;
        }

        .admin-controls input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.2);
        }

        .admin-footer {
            margin-top: auto;
            padding: var(--space-2xl) 0;
            text-align: center;
            opacity: 0.8;
            font-size: var(--text-xs);
        }

        .admin-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: text-decoration 0.2s;
        }

        .admin-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .admin-nav-container {
                padding: 0 1rem;
            }

            .brand-name {
                font-size: 1.4rem;
            }

            .brand-tagline {
                font-size: 0.65rem;
            }

            .nav-actions span {
                display: none; /* Hide button text on small screens */
            }

            .nav-actions .btn {
                padding: 8px;
                min-width: 0;
            }

            .management-header {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>

<body>
    <nav class="admin-nav">
        <div class="admin-nav-container">
            <div class="nav-brand">
                <div class="brand-icon">
                    <img src="../assets/images/logo.png" alt="Rannaghor Logo">
                </div>
                <div class="brand-text">
                    <span class="brand-name">Rannaghor</span>
                    <div class="brand-sub-row">
                        <span class="brand-tagline">Admin Dashboard</span>
                    </div>
                </div>
            </div>

            <div class="nav-actions">
                <a href="kitchen.html" target="_blank" class="btn btn-primary btn-sm">
                    <i data-lucide="chef-hat"></i>
                    <span>Kitchen</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="admin-container">
        <main class="qr-management-section">
            <div class="management-header">
                <h2 class="selector-title">Table Management</h2>
                <div class="admin-controls">
                    <label for="tableCount">Number of Tables</label>
                    <input type="number" id="tableCount" value="4" min="1" max="100" />
                </div>
            </div>

            <div id="qrGridContainer" class="qr-management-grid">
                <!-- QR Cards will be dynamically injected here -->
            </div>
        </main>

        <footer class="admin-footer">
            <p>
                © 2026 Rannaghor. All rights reserved.
                <br>
                Designed & Developed by
                <a href="https://github.com/tamimtxd" target="_blank">
                    Tamim
                </a>
            </p>
        </footer>
    </div>

    <script src="../js/management.js"></script>
</body>

</html>
