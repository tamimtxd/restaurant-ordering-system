<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rannaghor | Management</title>
    <link rel="stylesheet" href="../css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../assets/images/logo.png">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--color-bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-2xl) var(--space-lg);
            width: 100%;
        }

        .admin-header {
            text-align: center;
            margin-bottom: var(--space-3xl);
        }

        .admin-brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .admin-logo {
            width: 200px;
            height: 200px;
            border-radius: var(--radius-2xl);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--space-md);
        }

        .admin-logo img {
            width: 100%;
            height: auto;
        }

        .admin-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
        }

        .admin-subtitle {
            color: var(--color-text-secondary);
            font-size: var(--text-sm);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .qr-management-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-2xl);
            padding: var(--space-xl);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .management-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-xl);
            flex-wrap: wrap;
            gap: var(--space-md);
        }

        .qr-management-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: var(--space-lg);
        }

        .qr-management-card {
            background: var(--color-bg-card);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            display: flex;
            flex-direction: column;
            gap: var(--space-lg);
            transition: all var(--transition-base);
        }

        .qr-management-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .qr-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .qr-table-number {
            font-weight: var(--font-bold);
            font-size: var(--text-lg);
        }

        .btn-icon-qr {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--color-border);
            color: var(--color-text-primary);
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-icon-qr:hover {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .qr-card-body {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: var(--space-md);
            background: white;
            border-radius: var(--radius-lg);
            aspect-ratio: 1 / 1;
            width: fit-content;
            margin: 0 auto;
        }

        .qr-preview {
            width: 140px;
            height: 140px;
        }

        .qr-card-footer {
            margin-top: auto;
        }

        .btn-full {
            width: 100%;
        }

        /* Actions */
        .admin-header-actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: var(--space-xl);
        }

        /* Controls */
        .admin-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255, 255, 255, 0.05);
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-lg);
            border: 1px solid var(--color-border);
            width: fit-content;
        }

        .admin-controls label {
            font-size: var(--text-sm);
            font-weight: var(--font-bold);
            color: var(--color-text-secondary);
        }

        .admin-controls input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: var(--space-xs) var(--space-sm);
            width: 70px;
            text-align: center;
            color: white;
            font-weight: var(--font-bold);
            transition: all 0.2s;
        }

        .admin-controls input:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 2px rgba(255, 140, 0, 0.2);
        }

        .admin-footer {
            margin-top: auto;
            padding: var(--space-2xl) 0;
            text-align: center;
            opacity: 0.8;
            font-size: var(--text-xs);
        }

        .admin-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 600;
            transition: text-decoration 0.2s;
        }

        .admin-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .management-header {
                flex-direction: column;
                align-items: stretch;
            }

            .admin-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="admin-brand">
                <div class="admin-logo">
                    <img src="../assets/images/logo.png" alt="Rannaghor Logo">
                </div>
                <h1 class="admin-title">Rannaghor</h1>
                <p class="admin-subtitle">Admin Dashboard</p>
            </div>
            <div class="admin-header-actions">
                <a href="kitchen.html" class="btn btn-primary btn-sm">
                    <i data-lucide="chef-hat"></i>
                    <span>Kitchen Dashboard</span>
                </a>
            </div>
        </header>

        <main class="qr-management-section">
            <div class="management-header">
                <h2 class="selector-title">Table Management</h2>
                <div class="admin-controls">
                    <label for="tableCount">Number of Tables</label>
                    <input type="number" id="tableCount" value="12" min="1" max="100" />
                </div>
            </div>

            <div id="qrGridContainer" class="qr-management-grid">
                <!-- QR Cards will be dynamically injected here -->
            </div>
        </main>

        <footer class="admin-footer">
            <p>
                © 2026 Rannaghor. All rights reserved.
                <br>
                Designed & Developed by
                <a href="https://github.com/tamimtxd" target="_blank">
                    Tamim
                </a>
            </p>
        </footer>
    </div>

    <script src="../js/management.js"></script>
</body>

</html>
